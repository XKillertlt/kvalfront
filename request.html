<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корочки.есть | Запись на курсы</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="mainAppContent">
    <!-- Создание заявки -->
    <div class="form-card">
        <h2><i class="fas fa-file-alt"></i>Новая заявка на курс</h2>
        <form id="formaZayavki">
            <div class="form-row">
                <div class="input-group">
                    <label>Название курса</label>
                    <input type="text" id="kursName" required>
                </div>
                <div class="input-group">
                    <label>Желаемая дата начала</label>
                    <input type="date" id="kursDate" required>
                </div>
            </div>
            <div class="form-row">
                <div class="input-group">
                    <label>Способ оплаты</label>
                    <select id="sposobOplaty">
                        <option value="cash">Наличными</option>
                        <option value="transfer">Перевод по номеру телефона</option>
                    </select>
                </div>
            </div>
            <div style="display: flex; justify-content: space-between;">
                <button class="btn-primary" onclick="newRequest()">Отправить заявку</button>
                <a href="content.html" class="btn-danger">Вернуться</a>
            </div>
        </form>
    </div>
</div>
<script src="js/request.js"></script>
</body>
</html>
