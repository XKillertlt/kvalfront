<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корочки.есть | Запись на курсы</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="main-wrapper">
    <div class="top-header">
        <h1><i class="fas fa-graduation-cap"></i>Корочки.есть</h1>
        <p>Запись на курсы дополнительного профессионального образования</p>
    </div>
    <div class="content-box">
        <!-- ===== БЛОК РЕГИСТРАЦИИ ===== -->
        <div class="form-card" id="blockRegistraciya">
            <h2><i class="fas fa-user-plus"></i>Регистрация</h2>
            <form id="formaRegistracii">
                <div class="form-row">
                    <div class="input-group">
                        <label><i class="fas fa-user"></i>Логин (лат+цифры, ≥6)</label>
                        <input type="text" id="regLogin" placeholder="login123" required>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-lock"></i>Пароль (≥8 символов)</label>
                        <input type="password" id="regPassword" placeholder="********" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="input-group">
                        <label><i class="fas fa-signature"></i>ФИО (кириллица)</label>
                        <input type="text" id="regFio" placeholder="Иванов Иван Иванович" required>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-phone"></i>Телефон 8(XXX)XXX-XX-XX</label>
                        <input type="text" id="regPhone" placeholder="8(999)123-45-67" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="input-group">
                        <label><i class="fas fa-envelope"></i>Email</label>
                        <input type="email" id="regEmail" placeholder="user@example.com" required>
                    </div>
                </div>
                <button class="btn-primary" onclick="Register()"><i class="fas fa-save"></i>Создать пользователя</button>
                <a type="button" id="perehodVhod" class="btn-secondary" href="authorization.html" style="margin-left: 12px;">Уже зарегистрированы? Войти</a>
            </form>
        </div>
    </div>
</div>
<script src="auth.js"></script>
</body>
</html>
