<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корочки.есть | Запись на курсы</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ===== БЛОК АВТОРИЗАЦИИ ===== -->
    <div class="form-card" id="blockAvtorizaciya">
        <h2><i class="fas fa-sign-in-alt"></i>Авторизация</h2>
        <form id="formaAvtorizacii">
            <div class="form-row">
                <div class="input-group">
                    <label>Логин</label>
                    <input type="text" id="authLogin" required>
                </div>
                <div class="input-group">
                    <label>Пароль</label>
                    <input type="password" id="authPassword" required>
                </div>
            </div>
            <a class="btn-primary" onclick="Login()"><i class="fas fa-key"></i>Войти</a>
            <a type="button" id="perehodReg" class="btn-secondary" href="index.html" style="margin-left: 12px;">Ещё не зарегистрированы? Регистрация</a>
        </form>
    </div>
    <script src="auth.js"></script>
</body>
</html>
