<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корочки.есть | Запись на курсы</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- Модальное окно для редактирования статуса (админ) -->
<div id="statusModal" class="modal-overlay" style="display: flex;">
    <div class="modal-window">
        <div class="modal-header">
            <h3>Изменение статуса заявки</h3>
            <span class="modal-close" id="closeStatusModal">&times;</span>
        </div>
        <div class="modal-body">
            <form id="statusChangeForm">
                <input type="hidden" id="statusZayavkaId">
                <div class="input-group">
                    <label>Новый статус</label>
                    <select id="newStatusSelect">
                        <option value="new">Новая</option>
                        <option value="learning">Идет обучение</option>
                        <option value="finished">Обучение завершено</option>
                    </select>
                </div>
                <div class="form-buttons">
                    <button type="submit" class="btn-primary">Сохранить</button>
                    <button type="button" class="btn-danger" id="cancelStatusBtn">Отмена</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
